<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Tabela com Borda Central Pintada</title>
    <style>
        table {
            width: 30%;
            border-collapse: collapse;
        }
        caption {
            caption-side: top;
            margin: 0px 0;
            font-weight: bold;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }
        th:nth-child(2),th:nth-child(3) {
            border-top: 2px solid rgb(0, 0, 0);
        }

        /* Estilo para as células da primeira coluna */
        
        td:first-child, th:first-child{
            text-align: right;
        }

        td:last-child, th:last-child{
            text-align: left;
        }

        td:nth-child(3), th:nth-child(3){
            border-left: 2px solid rgb(0, 0, 0); /* Borda central pintada de azul */
        }
    </style>
</head>
<body>
    <h2>Tabela com várias bordas pintadas</h2>  
    <table>
        <caption>Dados de Exemplo</caption>
        <thead>
            <tr>
                <th></th>
                <th></th>
                <th></th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1a</td>
                <td>1.000</td>
                <td>1.000</td>
                <td>1a</td>
            </tr>
            <tr>
                <td>2a</td>
                <td>2.000</td>
                <td>2.000</td>
                <td>2a</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
